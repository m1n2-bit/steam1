<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>GameZone</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
    text-align: center;
    background-attachment: fixed;
}

/* glow effect */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at 20% 20%, rgba(0,229,255,0.15), transparent 40%),
                radial-gradient(circle at 80% 30%, rgba(0,255,157,0.12), transparent 40%);
    pointer-events: none;
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 30px;
    background: rgba(0, 0, 0, 0.4);
    backdrop-filter: blur(10px);
    position: sticky;
    top: 0;
}

/* باقي الكود زي ما هو */
#games {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 25px;
    padding: 30px;
}

.card {
    width: 250px;
    padding: 12px;
    border-radius: 15px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-10px);
    box-shadow: 0 0 15px rgba(0,229,255,0.4);
}

.card img {
    width: 100%;
    height: 150px;
    object-fit: cover;
}

button {
    margin-top: 10px;
    padding: 10px;
    width: 100%;
    border: none;
    border-radius: 8px;
    background: #00e5ff;
    cursor: pointer;
}
</style>

</head>

<body>

<h1>🔥 GameZone شغال 🔥</h1>
<div id="games"></div>

<script>
const games = [
{ name: "GTA V", img: "https://upload.wikimedia.org/wikipedia/en/a/a5/Grand_Theft_Auto_V.png", download: "#" }
];

const container = document.getElementById("games");

games.forEach(game => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
        <img src="${game.img}">
        <h3>${game.name}</h3>
        <button>Download</button>
    `;

    container.appendChild(div);
});
</script>

</body>
</html>
