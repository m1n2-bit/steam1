<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GameZone</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
    text-align: center;
    overflow-x: hidden;
}

body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at 20% 20%, rgba(0,229,255,0.15), transparent 40%),
                radial-gradient(circle at 80% 30%, rgba(0,255,157,0.12), transparent 40%);
    pointer-events: none;
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 30px;
    background: rgba(0, 0, 0, 0.4);
    backdrop-filter: blur(12px);
    position: sticky;
    top: 0;
    z-index: 1000;
    border-bottom: 1px solid rgba(255,255,255,0.1);
}

.logo {
    font-size: 22px;
    font-weight: bold;
}

.links {
    display: flex;
    gap: 15px;
}

.links a {
    text-decoration: none;
    color: white;
    padding: 8px 12px;
    border-radius: 8px;
    transition: 0.3s;
    display: flex;
    align-items: center;
    gap: 6px;
}

.links a:hover {
    background: rgba(0,229,255,0.15);
    color: #00e5ff;
    box-shadow: 0 0 10px #00e5ff;
}

.menu-btn {
    display: none;
    background: none;
    border: none;
    color: white;
    font-size: 20px;
    cursor: pointer;
}

/* SIDEBAR */
.sidebar {
    position: fixed;
    top: 0;
    left: -250px;
    width: 250px;
    height: 100%;
    background: rgba(0,0,0,0.9);
    backdrop-filter: blur(12px);
    display: flex;
    flex-direction: column;
    padding-top: 60px;
    transition: 0.3s;
    z-index: 2000;
}

.sidebar a {
    padding: 15px;
    color: white;
    text-decoration: none;
}

.sidebar a:hover {
    background: rgba(0,229,255,0.2);
    color: #00e5ff;
}

h1 {
    margin: 25px;
    font-size: 32px;
}

/* GRID */
#games {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 25px;
    padding: 30px;
}

/* CARD */
.card {
    width: 260px;
    padding: 15px;
    border-radius: 16px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-10px) scale(1.03);
    box-shadow: 0 0 20px rgba(0,229,255,0.4);
}

.card img {
    width: 100%;
    height: 150px;
    object-fit: cover;
    border-radius: 10px;
}

.card h3 {
    margin: 10px 0;
    font-size: 16px;
}

button {
    margin-top: 12px;
    padding: 10px;
    width: 100%;
    border: none;
    border-radius: 8px;
    background: linear-gradient(45deg, #00bcd4, #00e5ff);
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    box-shadow: 0 0 10px #00e5ff, 0 0 20px #00e5ff;
}

@media (max-width: 768px) {
    .links {
        display: none;
    }
    .menu-btn {
        display: block;
    }
}
</style>
</head>

<body>

<div class="navbar">
    <div class="logo">🎮 GameZone</div>

    <button class="menu-btn" onclick="toggleSidebar()">
        <i class="fas fa-bars"></i>
    </button>

    <div class="links">
        <a href="index.html"><i class="fas fa-home"></i> Home</a>

        <!-- FIX: absolute path for GitHub Pages -->
        <a href="./downloads.html"><i class="fas fa-download"></i> Downloads</a>

        <a href="https://www.youtube.com" target="_blank"><i class="fab fa-youtube"></i> YouTube</a>
    </div>
</div>

<div id="sidebar" class="sidebar">
    <a href="index.html"><i class="fas fa-home"></i> Home</a>

    <!-- FIX: same here -->
    <a href="./downloads.html"><i class="fas fa-download"></i> Downloads</a>

    <a href="https://www.youtube.com" target="_blank"><i class="fab fa-youtube"></i> YouTube</a>
</div>

<h1>Games</h1>

<div id="games"></div>

<script>
function toggleSidebar() {
    const sidebar = document.getElementById("sidebar");
    sidebar.style.left = sidebar.style.left === "0px" ? "-250px" : "0px";
}

const games = [
{ name: "+200 Steam Tools Games", img: "https://via.placeholder.com/300x200?text=Steam+Tools", download: "https://mega.nz/file/bZcHHLoI#VjWUIziv47ddtcGVJ0NUrL5AFp14EsZH2bOaCv79zDQ" },
{ name: "Blur", img: "https://assets-prd.ignimgs.com/2024/04/10/blur-object-1712712272688.jpg", download: "https://mega.nz/file/jZVV3CSb#KeCO5iuYy9gMf1mmGkaIkz2q63y6DwCmhKWhXyNbEQ4" },
{ name: "FC 24", img: "https://image.api.playstation.com/vulcan/ap/rnd/202408/0817/4248a0d1a669210e5caf5174eda176c7883be2c9089fa106.png", download: "https://mega.nz/file/mRk32Y5T#mU2eJJzszfBMsGz3uBElA6XLQl4W54XAH0CVihrohNc" }
];

const container = document.getElementById("games");

games.forEach(game => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
        <img src="${game.img}">
        <h3>${game.name}</h3>
        <button onclick="window.location.href='${game.download}'">Download</button>
    `;

    container.appendChild(div);
});
</script>

</body>
</html>
