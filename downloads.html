body {

    overflow-x: hidden;
}

body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at 20% 20%, rgba(0,229,255,0.15), transparent 40%),
                radial-gradient(circle at 80% 30%, rgba(0,255,157,0.12), transparent 40%);
    pointer-events: none;
}

.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 30px;
    background: rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(15px);
    position: sticky;
    top: 0;
    z-index: 1000;
}

.logo {
    font-size: 22px;
    font-weight: bold;
}

.links {
    display: flex;
    gap: 15px;
}

.links a {
    text-decoration: none;
    color: white;
    padding: 8px 12px;
    border-radius: 8px;
}

.links a:hover {
    background: rgba(0,229,255,0.15);
    color: #00e5ff;
}

.menu-btn {
    display: none;
    background: none;
    border: none;
    color: white;
    font-size: 20px;
    cursor: pointer;
}

.sidebar {
    position: fixed;
    top: 0;
    left: -250px;
    width: 250px;
    height: 100%;
    background: rgba(0,0,0,0.9);
    display: flex;
    flex-direction: column;
    padding-top: 60px;
    transition: 0.3s;
    z-index: 2000;
}

.sidebar a {
    padding: 15px;
    color: white;
    text-decoration: none;
}

.sidebar a:hover {
    background: rgba(0,229,255,0.2);
    color: #00e5ff;
}

h1 {
    margin: 25px;
    text-align: center;
}

.search-box {
    display: flex;
    justify-content: center;
    margin-bottom: 20px;
}

.search-box input {
    width: 60%;
    max-width: 400px;
    padding: 10px;
    border-radius: 8px;
    border: none;
    outline: none;
}

#games {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 25px;
    padding: 30px;
}

.game-card {
    width: 250px;
    padding: 12px;
    border-radius: 15px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 8px 25px rgba(0,0,0,0.4);
    transition: 0.3s;
}

.game-card:hover {
    transform: translateY(-10px) scale(1.03);
    box-shadow: 0 0 15px rgba(0,229,255,0.4);
}

.game-card img {
    width: 100%;
    height: 150px;
    object-fit: cover;
    border-radius: 10px;
}

.game-card h3 {
    font-size: 16px;
    margin: 10px 0;
}

.download-btn {
    display: block;
    text-align: center;
    margin-top: 10px;
    padding: 10px;
    border-radius: 8px;
    text-decoration: none;
    color: black;
    background: linear-gradient(45deg, #00bcd4, #00e5ff);
    font-weight: bold;
}

.download-btn:hover {
    box-shadow: 0 0 10px #00e5ff;
}

.no-results {
    text-align: center;
    margin-top: 20px;
    color: #ccc;
}

@media (max-width: 768px) {
    .links { display: none; }
    .menu-btn { display: block; }
}
</style>

const container = document.getElementById("games");
const noResults = document.getElementById("noResults");

function renderGames(list) {
    container.innerHTML = "";

    if (list.length === 0) {
        noResults.style.display = "block";
        return;
    } else {
        noResults.style.display = "none";
    }

    list.forEach(game => {
        const card = document.createElement("div");
        card.className = "game-card";

        card.innerHTML = `
            <img src="${game.img}">
            <h3>${game.name}</h3>
            <a class="download-btn" href="${game.download}" target="_blank">Download</a>
        `;

        container.appendChild(card);
    });
}

document.getElementById("search").addEventListener("input", function() {
    const value = this.value.toLowerCase();
    const filtered = games.filter(g => g.name.toLowerCase().includes(value));
    renderGames(filtered);
});

renderGames(games);
</script>
