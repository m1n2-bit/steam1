<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GameZone - Fixes</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
    margin: 0;
    font-family: Arial;
    color: white;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
}

.navbar {
    display: flex;
    justify-content: space-between;
    padding: 14px 30px;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(15px);
    position: sticky;
    top: 0;
}

.links a {
    color: white;
    margin-left: 15px;
    text-decoration: none;
}

.container {
    display: flex;
    justify-content: center;
    padding: 40px;
}

.card {
    width: 320px;
    padding: 20px;
    border-radius: 15px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    text-align: center;
}

.link-box {
    background: rgba(0,0,0,0.4);
    padding: 12px;
    border-radius: 8px;
    margin-top: 12px;
    word-break: break-all;
    cursor: pointer;
}

button {
    margin-top: 15px;
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: linear-gradient(45deg, #00bcd4, #00e5ff);
    cursor: pointer;
}

.copied {
    background: linear-gradient(45deg, #00c853, #64dd17) !important;
}
</style>
</head>

<body>

<div class="navbar">
    <div><b>🎮 GameZone</b></div>

    <div class="links">
        <a href="index.html"><i class="fas fa-home"></i> Home</a>
        <a href="downloads.html"><i class="fas fa-download"></i> Downloads</a>
        <a href="fixes.html"><i class="fas fa-wrench"></i> Fixes</a>
    </div>
</div>

<div class="container">
    <div class="card">
        <h3><i class="fas fa-user-shield"></i> Accounts Skip</h3>
        <p>Skip login restrictions</p>

        <div class="link-box" id="linkText">
https://mega.nz/file/aANADQ4K#bEUOJoeYhVIO_Ni23gv-9XzAFh0MoYpfLTZRe-g7Nhk
        </div>

        <button id="copyBtn" onclick="copyLink()">
            <i class="fas fa-copy"></i> Copy
        </button>
    </div>
</div>

<script>
function copyLink() {
    const text = document.getElementById("linkText").innerText.trim();
    const btn = document.getElementById("copyBtn");

    navigator.clipboard.writeText(text).then(() => {
        btn.innerHTML = "✔ Copied!";
        btn.classList.add("copied");

        setTimeout(() => {
            btn.innerHTML = '<i class="fas fa-copy"></i> Copy';
            btn.classList.remove("copied");
        }, 2000);
    });
}
</script>

</body>
</html>
